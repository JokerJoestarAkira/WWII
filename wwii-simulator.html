<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二次世界大戰人生模擬器</title>
    
    <!-- Favicon（瀏覽器標籤） -->
    <link rel="icon" type="image/png" href="logo.png" sizes="32x32">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    
    <!-- iOS 主畫面圖標 -->
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    
    <!-- PWA 配置 -->
    <meta name="theme-color" content="#c8a96e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="二戰模擬器">
    
    <!-- 應用程式圖標 -->
    <meta name="application-name" content="WWII Life Simulator">
    <meta name="msapplication-TileColor" content="#c8a96e">
    <meta name="msapplication-TileImage" href="logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0e0a04 0%, #1a1005 100%);
            color: #d4b896;
            font-family: 'Georgia', 'Palatino Linotype', serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Creation Screen */
        .creation-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .creation-header {
            text-align: center;
            border-bottom: 1px solid #2a2015;
            padding-bottom: 20px;
            margin-bottom: 8px;
        }

        .creation-header .subtitle {
            font-size: 11px;
            letter-spacing: 4px;
            color: #8a7050;
            margin-bottom: 4px;
        }

        .creation-header .title {
            font-size: 26px;
            color: #c8a96e;
            letter-spacing: 2px;
            margin: 0;
        }

        .creation-header .subtitle2 {
            font-size: 13px;
            color: #8a7050;
            margin-top: 2px;
        }

        .step-title {
            font-size: 18px;
            color: #c8a96e;
            margin-bottom: 4px;
            font-weight: 400;
        }

        .step-sub {
            font-size: 12px;
            color: #8a7050;
            margin: 0;
        }

        .progress-bar {
            display: flex;
            gap: 4px;
            margin: 20px 0 24px;
        }

        .progress-bar div {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: #2a2015;
            transition: background 0.3s;
        }

        .progress-bar div.active {
            background: #c8a96e;
        }

        .creation-card {
            background: #12100a;
            border: 1px solid #2a2015;
            border-radius: 4px;
            padding: 20px;
            min-height: 180px;
            margin-bottom: 16px;
            flex: 1;
        }

        .opt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        .opt-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 10px;
            background: #1a1005;
            border: 1px solid #2a2015;
            border-radius: 4px;
            cursor: pointer;
            color: #a89070;
            font-size: 13px;
            gap: 4px;
            transition: all 0.2s;
            font-family: 'Georgia', serif;
        }

        .opt-btn:hover {
            border-color: #8a7050;
        }

        .opt-btn.active {
            border-color: #c8a96e;
            color: #c8a96e;
            background: #1f1608;
        }

        .list-btn {
            padding: 10px 16px;
            background: #1a1005;
            border: 1px solid #2a2015;
            border-radius: 4px;
            cursor: pointer;
            color: #a89070;
            text-align: left;
            font-size: 13px;
            transition: all 0.2s;
            font-family: 'Georgia', serif;
            width: 100%;
            margin-bottom: 8px;
        }

        .list-btn:hover {
            border-color: #8a7050;
        }

        .list-btn.active {
            border-color: #c8a96e;
            color: #c8a96e;
            background: #1f1608;
        }

        .small-btn {
            padding: 6px 12px;
            background: #1a1005;
            border: 1px solid #2a2015;
            border-radius: 3px;
            cursor: pointer;
            color: #a89070;
            font-size: 12px;
            transition: all 0.2s;
            font-family: 'Georgia', serif;
            margin: 0 6px 6px 0;
        }

        .small-btn:hover {
            border-color: #8a7050;
        }

        .small-btn.active {
            border-color: #c8a96e;
            color: #c8a96e;
            background: #1f1608;
        }

        .label {
            display: block;
            font-size: 11px;
            color: #8a7050;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .input, .select, textarea {
            width: 100%;
            background: #1a1005;
            border: 1px solid #2a2015;
            border-radius: 3px;
            color: #d4b896;
            padding: 8px 10px;
            font-size: 13px;
            font-family: 'Georgia', serif;
            margin-bottom: 12px;
        }

        .input:focus, .select:focus, textarea:focus {
            outline: none;
            border-color: #c8a96e;
            box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .summary-bar {
            margin-top: 12px;
            padding: 8px 12px;
            background: #1a1005;
            border: 1px solid #2a2015;
            border-radius: 3px;
            font-size: 11px;
            color: #8a7050;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .nav-btn {
            flex: 1;
            padding: 10px 20px;
            background: #1a1005;
            border: 1px solid #c8a96e;
            border-radius: 3px;
            color: #c8a96e;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Georgia', serif;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #1f1608;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn-secondary {
            padding: 10px 16px;
            background: transparent;
            border: 1px solid #2a2015;
            border-radius: 3px;
            color: #8a7050;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Georgia', serif;
        }

        .nav-btn-secondary:hover {
            border-color: #8a7050;
        }

        .nav-btn.start {
            background: #c8a96e;
            color: #1a1005;
        }

        /* Game Screen */
        .game-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2a2015;
            background: #0e0a04;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-flag {
            font-size: 16px;
        }

        .player-name {
            font-size: 13px;
            color: #c8a96e;
            font-weight: 600;
        }

        .player-rank {
            font-size: 10px;
            color: #8a7050;
        }

        .top-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid #2a2015;
            border-radius: 3px;
            color: #8a7050;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Georgia', serif;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: #8a7050;
        }

        .stats-panel {
            padding: 12px 16px;
            background: #12100a;
            border-bottom: 1px solid #2a2015;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-bar {
            margin-bottom: 6px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a89070;
            margin-bottom: 2px;
        }

        .stat-value {
            color: #c8a96e;
        }

        .stat-fill {
            height: 4px;
            background: #2a2015;
            border-radius: 2px;
            overflow: hidden;
        }

        .stat-bar-inner {
            height: 100%;
            background: #c8a96e;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        .stat-bar-inner.low {
            background: #c0392b;
        }

        .stat-bar-inner.medium {
            background: #e67e22;
        }

        .context-bar {
            display: flex;
            gap: 12px;
            padding: 6px 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1a1208;
            font-size: 11px;
            color: #8a7050;
            background: #0e0a04;
        }

        .narrative-area {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            min-height: 200px;
        }

        .narrative {
            font-size: 14px;
            line-height: 1.9;
            color: #c8b090;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .npc-section {
            margin-top: 20px;
        }

        .npc-block {
            border-left: 2px solid #c8a96e;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .npc-name {
            font-size: 12px;
            color: #c8a96e;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .npc-mood {
            font-weight: 400;
            color: #8a7050;
        }

        .npc-dialogue {
            font-size: 13px;
            color: #a89070;
            font-style: italic;
        }

        .clues-section {
            margin-top: 16px;
            padding: 12px;
            background: #12100a;
            border: 1px solid #2a2015;
            border-radius: 3px;
        }

        .clues-title {
            font-size: 11px;
            color: #8a7050;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .clue-item {
            font-size: 12px;
            color: #a89070;
            margin-bottom: 3px;
        }

        .choices-area {
            padding: 16px;
            border-top: 1px solid #2a2015;
            background: #0e0a04;
        }

        .choices-title {
            text-align: center;
            font-size: 11px;
            color: #8a7050;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .choice-btn {
            width: 100%;
            padding: 10px 14px;
            background: #12100a;
            border: 1px solid #2a2015;
            border-radius: 3px;
            cursor: pointer;
            color: #a89070;
            text-align: left;
            transition: all 0.15s;
            font-family: 'Georgia', serif;
            margin-bottom: 8px;
        }

        .choice-btn:hover {
            border-color: #8a7050;
            background: #1a1005;
        }

        .choice-id {
            display: inline-block;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            background: #2a2015;
            border-radius: 2px;
            font-size: 11px;
            color: #c8a96e;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .choice-label {
            font-size: 13px;
            color: #c8b090;
        }

        .risk-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 2px;
            margin-left: 6px;
        }

        .risk-low {
            background: #27ae6022;
            color: #27ae60;
            border: 1px solid #27ae6044;
        }

        .risk-medium {
            background: #e67e2222;
            color: #e67e22;
            border: 1px solid #e67e2244;
        }

        .risk-high {
            background: #c0392b22;
            color: #c0392b;
            border: 1px solid #c0392b44;
        }

        .choice-hint {
            font-size: 11px;
            color: #8a7050;
            margin-top: 4px;
            margin-left: 30px;
        }

        .custom-input-wrap {
            margin-top: 12px;
        }

        .custom-label {
            font-size: 11px;
            color: #8a7050;
            margin-bottom: 6px;
            display: block;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        .input-group input {
            flex: 1;
            margin-bottom: 0;
        }

        .send-btn {
            padding: 8px 16px;
            background: #c8a96e;
            border: none;
            border-radius: 3px;
            color: #1a1005;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            filter: brightness(1.2);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .round-bar {
            padding: 6px 16px;
            font-size: 10px;
            color: #4a3a20;
            border-top: 1px solid #1a1208;
            text-align: center;
            letter-spacing: 2px;
            background: #0e0a04;
        }

        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
        }

        .loading-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #c8a96e;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        .loading-text {
            color: #8a7050;
            font-size: 13px;
            margin-top: 12px;
        }

        .save-buttons {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #2a2015;
            background: #0e0a04;
            flex-wrap: wrap;
        }

        .save-btn {
            padding: 8px 14px;
            background: #1a1005;
            border: 1px solid #2a2015;
            border-radius: 3px;
            color: #a89070;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Georgia', serif;
            transition: all 0.2s;
        }

        .save-btn:hover {
            border-color: #8a7050;
            color: #c8a96e;
        }

        .hidden-file-input {
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: #12100a;
            border: 1px solid #2a2015;
            border-radius: 4px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            color: #c8a96e;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #8a7050;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-content {
            clear: both;
            font-size: 13px;
            color: #a89070;
            line-height: 1.8;
        }

        .code-box {
            background: #1a1005;
            border: 1px solid #2a2015;
            border-radius: 3px;
            padding: 12px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            color: #c8a96e;
            user-select: all;
        }

        .copy-btn {
            padding: 8px 14px;
            background: #c8a96e;
            color: #1a1005;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Georgia', serif;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            filter: brightness(1.1);
        }

        .copy-btn.copied {
            background: #27ae60;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0e0a04;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2015;
            border-radius: 2px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ─── STATE MANAGEMENT ────────────────────────────────────────────
        let appState = {
            phase: 'creation', // 'creation' or 'game'
            character: null,
            gameState: null,
            stats: {
                health: 85, morale: 70, money: 40, charm: 55,
                combat_fatigue: 10, trauma: 5, reputation: 20, political_risk: 5
            },
            round: 1,
            log: [],
            creationStep: 0,
            creationData: {
                name: '', gender: '男', birthYear: 1915, faction: null, branch: '',
                education: '', motivation: '', personality: '', backstory: ''
            }
        };

        // ─── CONSTANTS ───────────────────────────────────────────────────
        const FACTIONS = [
            { id: 'germany', label: '德意志國防軍', flag: '🇩🇪', branches: ['陸軍', '空軍', '海軍', '武裝親衛隊'] },
            { id: 'usa', label: '美利堅合眾國', flag: '🇺🇸', branches: ['陸軍', '海軍陸戰隊', '海軍', '陸軍航空隊'] },
            { id: 'uk', label: '大英帝國', flag: '🇬🇧', branches: ['陸軍', '皇家空軍', '皇家海軍'] },
            { id: 'ussr', label: '蘇維埃聯盟', flag: '🇸🇴', branches: ['紅軍', '海軍', '空軍'] },
            { id: 'japan', label: '大日本帝國', flag: '🇯🇵', branches: ['陸軍', '海軍', '航空隊'] },
            { id: 'china', label: '中華民國', flag: '🇹🇼', branches: ['國民革命軍', '中央軍', '空軍'] }
        ];

        const BIRTH_YEARS = Array.from({ length: 16 }, (_, i) => 1900 + i);
        const EDUCATION_OPTIONS = ['小學', '中學', '大學', '軍校', '技術學校'];
        const MOTIVATION_OPTIONS = ['愛國主義', '保護家人', '追求榮耀', '逃避貧窮', '徵召入伍', '理念信仰'];
        const PERSONALITY_OPTIONS = ['沉穩冷靜', '衝動勇猛', '謹慎多疑', '樂觀開朗', '憂鬱寡言', '狡猾機智'];

        // ─── STORAGE FUNCTIONS ──────────────────────────────────────────
        function saveToLocalStorage() {
            const save = {
                character: appState.character,
                stats: appState.stats,
                round: appState.round,
                gameState: appState.gameState,
                log: appState.log
            };
            localStorage.setItem('wwii_simulator_save', JSON.stringify(save));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('wwii_simulator_save');
            if (saved) {
                const data = JSON.parse(saved);
                appState.character = data.character;
                appState.stats = data.stats;
                appState.round = data.round;
                appState.gameState = data.gameState;
                appState.log = data.log;
                appState.phase = 'game';
                render();
                return true;
            }
            return false;
        }

        function exportSave() {
            const save = {
                character: appState.character,
                stats: appState.stats,
                round: appState.round,
                gameState: appState.gameState,
                log: appState.log,
                timestamp: new Date().toISOString()
            };
            const json = JSON.stringify(save, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${appState.character.name}_${appState.round}回合.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function generateShareCode() {
            const save = {
                character: appState.character,
                stats: appState.stats,
                round: appState.round,
                gameState: appState.gameState,
                log: appState.log
            };
            const json = JSON.stringify(save);
            return btoa(json).substring(0, 100) + '...';
        }

        function copyShareCode() {
            const save = {
                character: appState.character,
                stats: appState.stats,
                round: appState.round,
                gameState: appState.gameState,
                log: appState.log
            };
            const json = JSON.stringify(save);
            const code = btoa(json);
            navigator.clipboard.writeText(code).then(() => {
                showModal('✓ 分享代碼已複製到剪貼板', '朋友可以貼上「導入進度」來繼續你的故事');
            });
        }

        function importFromCode() {
            const code = prompt('貼上分享代碼：');
            if (!code) return;
            try {
                const json = atob(code);
                const data = JSON.parse(json);
                appState.character = data.character;
                appState.stats = data.stats;
                appState.round = data.round;
                appState.gameState = data.gameState;
                appState.log = data.log;
                appState.phase = 'game';
                saveToLocalStorage();
                render();
            } catch (e) {
                alert('❌ 代碼無效或已損壞');
            }
        }

        // ─── UI HELPERS ─────────────────────────────────────────────────
        function html(strings, ...values) {
            return strings.reduce((acc, str, i) => acc + str + (values[i] || ''), '');
        }

        function showModal(title, content) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <button class="modal-close" onclick="this.parentElement.parentElement.remove()">×</button>
                    <h2>${title}</h2>
                    <div class="modal-content">${content}</div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }

        function getStatColor(value) {
            if (value < 30) return 'low';
            if (value < 60) return 'medium';
            return '';
        }

        function renderStatBar(label, value, max = 100) {
            const pct = Math.max(0, Math.min(100, (value / max) * 100));
            const colorClass = getStatColor(value);
            return `
                <div class="stat-bar">
                    <div class="stat-label">
                        <span>${label}</span>
                        <span class="stat-value">${value}</span>
                    </div>
                    <div class="stat-fill">
                        <div class="stat-bar-inner ${colorClass}" style="width: ${pct}%"></div>
                    </div>
                </div>
            `;
        }

        // ─── CREATION SCREEN ────────────────────────────────────────────
        function renderCreation() {
            const steps = [
                // Step 0: Faction
                {
                    render: () => `
                        <h2 class="step-title">選擇陣營</h2>
                        <p class="step-sub">你將以哪個國家的士兵身份參戰？</p>
                        <div class="opt-grid">
                            ${FACTIONS.map(f => `
                                <button class="opt-btn ${appState.creationData.faction === f.id ? 'active' : ''}"
                                    onclick="appState.creationData.faction='${f.id}'; appState.creationData.branch='${f.branches[0]}'; render()">
                                    <span style="font-size: 22px">${f.flag}</span>
                                    <span style="font-size: 12px; line-height: 1.3">${f.label}</span>
                                </button>
                            `).join('')}
                        </div>
                    `
                },
                // Step 1: Branch
                {
                    canProceed: () => !!appState.creationData.faction,
                    render: () => {
                        const faction = FACTIONS.find(f => f.id === appState.creationData.faction);
                        return `
                            <h2 class="step-title">選擇兵種</h2>
                            <p class="step-sub">你屬於哪個軍種？</p>
                            ${faction.branches.map(b => `
                                <button class="list-btn ${appState.creationData.branch === b ? 'active' : ''}"
                                    onclick="appState.creationData.branch='${b}'; render()">
                                    ${b}
                                </button>
                            `).join('')}
                        `;
                    }
                },
                // Step 2: Identity
                {
                    canProceed: () => !!appState.creationData.branch,
                    render: () => `
                        <h2 class="step-title">個人資料</h2>
                        <label class="label">姓名</label>
                        <input class="input" type="text" placeholder="輸入你的姓名..."
                            value="${appState.creationData.name}"
                            onchange="appState.creationData.name = this.value">
                        
                        <label class="label">性別</label>
                        <div>
                            <button class="small-btn ${appState.creationData.gender === '男' ? 'active' : ''}"
                                onclick="appState.creationData.gender='男'; render()">男</button>
                            <button class="small-btn ${appState.creationData.gender === '女' ? 'active' : ''}"
                                onclick="appState.creationData.gender='女'; render()">女</button>
                        </div>
                        
                        <label class="label">出生年份</label>
                        <select class="select" onchange="appState.creationData.birthYear = parseInt(this.value)">
                            ${BIRTH_YEARS.map(y => `
                                <option value="${y}" ${appState.creationData.birthYear === y ? 'selected' : ''}>
                                    ${y}年（1939年時${1939 - y}歲）
                                </option>
                            `).join('')}
                        </select>
                    `
                },
                // Step 3: Background
                {
                    canProceed: () => !!appState.creationData.name,
                    render: () => `
                        <h2 class="step-title">背景資料</h2>
                        <label class="label">教育程度</label>
                        <div>
                            ${EDUCATION_OPTIONS.map(e => `
                                <button class="small-btn ${appState.creationData.education === e ? 'active' : ''}"
                                    onclick="appState.creationData.education='${e}'; render()">
                                    ${e}
                                </button>
                            `).join('')}
                        </div>
                        
                        <label class="label">參軍動機</label>
                        <div>
                            ${MOTIVATION_OPTIONS.map(m => `
                                <button class="small-btn ${appState.creationData.motivation === m ? 'active' : ''}"
                                    onclick="appState.creationData.motivation='${m}'; render()">
                                    ${m}
                                </button>
                            `).join('')}
                        </div>
                        
                        <label class="label">性格特質</label>
                        <div>
                            ${PERSONALITY_OPTIONS.map(p => `
                                <button class="small-btn ${appState.creationData.personality === p ? 'active' : ''}"
                                    onclick="appState.creationData.personality='${p}'; render()">
                                    ${p}
                                </button>
                            `).join('')}
                        </div>
                    `
                },
                // Step 4: Backstory
                {
                    canProceed: () => appState.creationData.education && appState.creationData.motivation && appState.creationData.personality,
                    render: () => `
                        <h2 class="step-title">個人背景故事</h2>
                        <p class="step-sub">用幾句話描述你在參軍前的生活（可選）</p>
                        <textarea class="input" placeholder="例如：我在農村長大，家有三兄弟，戰爭爆發前剛剛結婚……"
                            onchange="appState.creationData.backstory = this.value">${appState.creationData.backstory}</textarea>
                    `
                }
            ];

            const currentStep = steps[appState.creationStep];
            const faction = FACTIONS.find(f => f.id === appState.creationData.faction);
            const canNext = currentStep.canProceed ? currentStep.canProceed() : true;

            return `
                <div class="creation-wrap container">
                    <div class="creation-header">
                        <div class="subtitle">WORLD WAR II · LIFE SIMULATOR</div>
                        <h1 class="title">第二次世界大戰</h1>
                        <div class="subtitle2">人生模擬器</div>
                    </div>

                    <div class="progress-bar">
                        ${steps.map((_, i) => `<div class="${i <= appState.creationStep ? 'active' : ''}"></div>`).join('')}
                    </div>

                    <div class="creation-card">
                        ${currentStep.render()}
                    </div>

                    ${faction ? `
                        <div class="summary-bar">
                            <span>${faction.flag} ${faction.label}</span>
                            ${appState.creationData.branch ? `<span>· ${appState.creationData.branch}</span>` : ''}
                            ${appState.creationData.name ? `<span>· ${appState.creationData.name}</span>` : ''}
                            ${appState.creationData.birthYear ? `<span>· ${appState.creationData.birthYear}年生</span>` : ''}
                        </div>
                    ` : ''}

                    <div class="nav-buttons">
                        ${appState.creationStep > 0 ? `
                            <button class="nav-btn-secondary" onclick="appState.creationStep--; render()">← 上一步</button>
                        ` : ''}
                        ${appState.creationStep < steps.length - 1 ? `
                            <button class="nav-btn" ${!canNext ? 'disabled' : ''} 
                                onclick="if(${canNext}) { appState.creationStep++; render(); }">
                                下一步 →
                            </button>
                        ` : `
                            <button class="nav-btn start" ${!canNext ? 'disabled' : ''} 
                                onclick="if(${canNext}) { startGame(); }">
                                ⚔ 開始模擬
                            </button>
                        `}
                    </div>
                </div>
            `;
        }

        function startGame() {
            appState.character = { ...appState.creationData };
            appState.phase = 'game';
            saveToLocalStorage();
            callGameAPI('開始遊戲');
        }

        // ─── GAME SCREEN ────────────────────────────────────────────────
        function callGameAPI(action) {
            const factionInfo = FACTIONS.find(f => f.id === appState.character.faction);
            const charDesc = `
角色：${appState.character.name}（${appState.character.gender}，${appState.character.birthYear}年生）
陣營：${factionInfo?.label} · ${appState.character.branch}
教育：${appState.character.education} | 動機：${appState.character.motivation} | 性格：${appState.character.personality}
背景：${appState.character.backstory || '無'}
當前狀態：健康${appState.stats.health} 士氣${appState.stats.morale} 資金${appState.stats.money} 魅力${appState.stats.charm} 戰鬥疲勞${appState.stats.combat_fatigue} 創傷${appState.stats.trauma} 聲望${appState.stats.reputation} 政治風險${appState.stats.political_risk}
回合：${appState.round}
`;

            let prompt = charDesc;
            if (appState.round === 1 && !appState.gameState) {
                prompt = `${charDesc}\n請生成第一幕：1939年9月戰爭爆發時，${appState.character.name}的故事開始。設定初始場景，介紹他/她的直屬長官和至少一位戰友NPC，呈現當時的歷史氛圍。`;
            } else {
                prompt = `${charDesc}\n上一幕結束後，${appState.character.name}選擇了：「${action}」\n請繼續劇情，反映此選擇的後果（合理的正面或負面），並推進時間線。`;
            }

            document.getElementById('app').innerHTML = renderGameLoading();

            // 使用延遲的 API 呼叫（模擬）
            setTimeout(async () => {
                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1000,
                            system: `你是一個二戰人生模擬器的世界模擬器（World Simulator）、Dungeon Master（DM）、NPC控制器、歷史事件管理器。

核心原則：
1. 你模擬1933–1949年真實運作的世界，世界獨立於玩家存在
2. 歷史事件按真實時間線發生，玩家只能影響個人命運和小型事件
3. 輸出必須用繁體中文，香港書面語風格
4. 每次回應必須包含：劇情正文（不少於300字）、NPC互動（如有）、數值變動、可見線索、選項

輸出格式（JSON）：
{
  "narrative": "劇情正文（300字以上，沉浸式第三人稱）",
  "npc_interactions": [{"name": "NPC姓名", "dialogue": "對話內容", "mood": "情緒"}],
  "stat_changes": {"health": 0, "morale": 0, "money": 0, "charm": 0, "combat_fatigue": 0, "trauma": 0, "reputation": 0, "political_risk": 0},
  "visible_clues": ["線索1", "線索2"],
  "choices": [
    {"id": "A", "label": "選項A文字", "risk": "低/中/高", "hint": "可能後果提示"},
    {"id": "B", "label": "選項B文字", "risk": "低/中/高", "hint": "可能後果提示"},
    {"id": "C", "label": "選項C文字", "risk": "低/中/高", "hint": "可能後果提示"},
    {"id": "D", "label": "選項D文字", "risk": "低/中/高", "hint": "可能後果提示"}
  ],
  "world_event": "當前世界大事（一句話）",
  "date": "YYYY年MM月DD日",
  "location": "當前地點",
  "weather": "天氣狀況"
}

歷史合理性絕對優先。禁止在時間線錯誤的情況下出現武器、事件或人物。`,
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });

                    const data = await response.json();
                    const text = data.content?.find(b => b.type === 'text')?.text || '';
                    const clean = text.replace(/```json\n?|\n?```/g, '').trim();
                    const parsed = JSON.parse(clean);

                    // Apply stat changes
                    Object.entries(parsed.stat_changes || {}).forEach(([k, v]) => {
                        if (k in appState.stats) {
                            appState.stats[k] = Math.max(0, Math.min(100, appState.stats[k] + v));
                        }
                    });

                    appState.gameState = parsed;
                    appState.round++;
                    appState.log.push({ action, narrative: parsed.narrative, date: parsed.date });
                    saveToLocalStorage();
                    render();
                } catch (e) {
                    appState.gameState = {
                        narrative: '【系統錯誤】無法連線至模擬器。請檢查網絡連接並重試。',
                        choices: [{ id: 'A', label: '重試', risk: '低', hint: '' }],
                        stat_changes: {},
                        visible_clues: [],
                        npc_interactions: [],
                        world_event: '',
                        date: '1939年9月1日',
                        location: '未知',
                        weather: '未知'
                    };
                    render();
                }
            }, 800);
        }

        function renderGameLoading() {
            return `
                <div class="game-wrap container" style="padding: 0;">
                    <div class="loading-wrap">
                        <div class="loading-dots">
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                        </div>
                        <div class="loading-text">世界模擬器運算中…</div>
                    </div>
                </div>
            `;
        }

        function renderGame() {
            const factionInfo = FACTIONS.find(f => f.id === appState.character.faction);
            const gameState = appState.gameState || {};

            return `
                <div class="game-wrap container" style="padding: 0;">
                    <!-- Top bar -->
                    <div class="top-bar">
                        <div class="player-info">
                            <span class="player-flag">${factionInfo?.flag}</span>
                            <div>
                                <div class="player-name">${appState.character.name}</div>
                                <div class="player-rank">${factionInfo?.label} · ${appState.character.branch}</div>
                            </div>
                        </div>
                        <div class="top-buttons">
                            ${gameState.date ? `<div style="font-size: 11px; color: #8a7050;">${gameState.date}</div>` : ''}
                            <button class="icon-btn" onclick="toggleStats()">▼ 數值</button>
                        </div>
                    </div>

                    <!-- Stats panel -->
                    <div id="stats-panel" class="stats-panel hidden">
                        <div>
                            ${renderStatBar('健康', appState.stats.health)}
                            ${renderStatBar('士氣', appState.stats.morale)}
                            ${renderStatBar('資金', appState.stats.money)}
                            ${renderStatBar('魅力', appState.stats.charm)}
                        </div>
                        <div>
                            ${renderStatBar('戰鬥疲勞', appState.stats.combat_fatigue)}
                            ${renderStatBar('創傷壓力', appState.stats.trauma)}
                            ${renderStatBar('軍中聲望', appState.stats.reputation)}
                            ${renderStatBar('政治風險', appState.stats.political_risk)}
                        </div>
                    </div>

                    <!-- Context bar -->
                    <div class="context-bar">
                        ${gameState.location ? `<span>📍 ${gameState.location}</span>` : ''}
                        ${gameState.weather ? `<span>🌤 ${gameState.weather}</span>` : ''}
                        ${gameState.world_event ? `<span style="color: #c8a96e;">📰 ${gameState.world_event}</span>` : ''}
                    </div>

                    <!-- Narrative -->
                    <div class="narrative-area">
                        ${gameState.narrative ? `
                            <div class="narrative">${gameState.narrative}</div>
                            ${gameState.npc_interactions && gameState.npc_interactions.length > 0 ? `
                                <div class="npc-section">
                                    ${gameState.npc_interactions.map(npc => `
                                        <div class="npc-block">
                                            <div class="npc-name">${npc.name} <span class="npc-mood">·${npc.mood}</span></div>
                                            <div class="npc-dialogue">「${npc.dialogue}」</div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                            ${gameState.visible_clues && gameState.visible_clues.length > 0 ? `
                                <div class="clues-section">
                                    <div class="clues-title">🔍 可見線索</div>
                                    ${gameState.visible_clues.map(c => `<div class="clue-item">· ${c}</div>`).join('')}
                                </div>
                            ` : ''}
                        ` : ''}
                    </div>

                    <!-- Save buttons -->
                    <div class="save-buttons">
                        <button class="save-btn" onclick="exportSave()">📥 下載進度</button>
                        <button class="save-btn" onclick="document.getElementById('upload-input').click()">📤 上傳進度</button>
                        <button class="save-btn" onclick="copyShareCode()">📋 複製分享代碼</button>
                        <button class="save-btn" onclick="importFromCode()">📌 貼上分享代碼</button>
                        <button class="save-btn" onclick="if(confirm('確定要重新開始嗎？')) { localStorage.removeItem('wwii_simulator_save'); appState.phase='creation'; appState.creationStep=0; appState.creationData={}; render(); }">🔄 重新開始</button>
                    </div>

                    <!-- Choices -->
                    <div class="choices-area">
                        <div class="choices-title">— 你的選擇 —</div>
                        ${gameState.choices ? gameState.choices.map(choice => `
                            <button class="choice-btn" onclick="handleChoice('${choice.label}')">
                                <span class="choice-id">${choice.id}</span>
                                <span class="choice-label">${choice.label}</span>
                                <span class="risk-badge risk-${choice.risk === '低' ? 'low' : choice.risk === '中' ? 'medium' : 'high'}">${choice.risk}風險</span>
                                ${choice.hint ? `<div class="choice-hint">${choice.hint}</div>` : ''}
                            </button>
                        `).join('') : ''}

                        <div class="custom-input-wrap">
                            <label class="custom-label">✏ 自由行動（輸入你的選擇）</label>
                            <div class="input-group">
                                <input class="input" id="custom-input" type="text" placeholder="輸入任何行動…" style="margin-bottom: 0;">
                                <button class="send-btn" onclick="sendCustomAction()">→</button>
                            </div>
                        </div>
                    </div>

                    <!-- Round bar -->
                    <div class="round-bar">
                        回合 ${appState.round - 1} · 章節 ${Math.ceil((appState.round - 1) / 6)}
                        ${(appState.round - 1) % 6 === 0 && appState.round > 1 ? '<span style="color: #c8a96e; margin-left: 8px;">★ 章節結算</span>' : ''}
                    </div>
                </div>

                <input type="file" id="upload-input" class="hidden-file-input" accept=".json" onchange="handleFileUpload(event)">
            `;
        }

        function toggleStats() {
            const panel = document.getElementById('stats-panel');
            if (panel) {
                panel.classList.toggle('hidden');
            }
        }

        function handleChoice(choice) {
            callGameAPI(choice);
        }

        function sendCustomAction() {
            const input = document.getElementById('custom-input');
            if (input.value.trim()) {
                callGameAPI(input.value.trim());
                input.value = '';
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    appState.character = data.character;
                    appState.stats = data.stats;
                    appState.round = data.round;
                    appState.gameState = data.gameState;
                    appState.log = data.log;
                    appState.phase = 'game';
                    saveToLocalStorage();
                    render();
                    alert('✓ 進度已匯入');
                } catch (err) {
                    alert('❌ 檔案無效或已損壞');
                }
            };
            reader.readAsText(file);
        }

        // ─── MAIN RENDER ────────────────────────────────────────────────
        function render() {
            const app = document.getElementById('app');
            if (appState.phase === 'creation') {
                app.innerHTML = renderCreation();
            } else if (appState.phase === 'game') {
                app.innerHTML = renderGame();
            }
        }

        // ─── INIT ───────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            if (!loadFromLocalStorage()) {
                render();
            }
        });
    </script>
</body>
</html>
